name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install CLI deps
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Run CLI tests
        run: npm test

      - name: Install relay deps
        working-directory: relay
        run: npm ci

      - name: Run relay tests
        working-directory: relay
        run: npm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - run: npm ci
      - run: npm run build
      - run: npm publish || true  # skip if version already published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-relay:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install relay deps
        working-directory: relay
        run: npm ci

      - name: Deploy relay
        working-directory: relay
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 98f7f5df215cccc750e75aac4bcf76fe

  bump-version:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Update package.json version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --cached --quiet || git commit -m "chore: bump version to $VERSION [skip ci]"
          git push origin main

  deploy-site:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone site repo
        uses: actions/checkout@v4
        with:
          repository: hashbranch/botsync-site
          path: site
          token: ${{ secrets.GH_PAT }}

      - name: Deploy site
        working-directory: site
        run: npx wrangler pages deploy . --project-name=botsync-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 98f7f5df215cccc750e75aac4bcf76fe
